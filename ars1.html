<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Matematik AR Bersuara: Kuasa Dua Sempurna</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      /* Butang panduan untuk aktifkan bunyi */
      #audio-guide {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.7);
        color: white;
        padding: 10px 20px;
        border-radius: 20px;
        font-family: Arial, sans-serif;
        font-size: 14px;
        z-index: 999;
        pointer-events: none;
        text-align: center;
      }
    </style>
  </head>
  
  <body style="margin: 0px; overflow: hidden;">
    
    <div id="audio-guide">Ketuk (Tap) skrin jika suara tidak keluar</div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-assets>
        <audio id="suara-penerangan" src="https://actions.google.com/sounds/v1/ambiences/morning_birds.ogg" preload="auto"></audio>
      </a-assets>

      <a-marker preset="hiro" id="marker-hiro">
        
        <a-entity sound="src: #suara-penerangan; autoplay: false; loop: true; volume: 10" id="audio-player"></a-entity>
        
        <a-entity position="-1.2 0 0" rotation="0 45 0" animation="property: rotation; to: 0 55 0; dir: alternate; dur: 2000; loop: true; easing: easeInOutQuad">
          <a-cone position="0 0.5 0" radius-bottom="0.3" radius-top="0.1" height="0.8" color="#3b82f6"></a-cone>
          <a-sphere position="0 1.05 0" radius="0.26" color="#ec4899"></a-sphere>
          <a-cone position="0 0.85 0" radius-bottom="0.25" radius-top="0.1" height="0.4" color="#ec4899"></a-cone>
          <a-sphere position="0 1.05 0.05" radius="0.2" color="#ffe4e6"></a-sphere>
          <a-sphere position="-0.07 1.1 0.22" radius="0.02" color="#1e293b"></a-sphere>
          <a-sphere position="0.07 1.1 0.22" radius="0.02" color="#1e293b"></a-sphere>
          <a-ellipse position="0 1.0 0.23" radius-x="0.03" radius-y="0.01" color="#be185d"
                     animation="property: scale; to: 1 4 1; dir: alternate; dur: 250; loop: true">
          </a-ellipse>
          <a-cylinder position="0.25 0.5 0.1" radius="0.04" height="0.4" color="#3b82f6" rotation="0 0 -45"
                      animation="property: rotation; to: 0 0 -20; dir: alternate; dur: 1000; loop: true">
          </a-cylinder>
        </a-entity>

        <a-entity position="0 1.6 -0.5">
          <a-text value="Cikgu Anggun: \n'Jawapan yang betul ialah C!\n\n16 ialah Kuasa Dua Sempurna\nsebab ia boleh disusun menjadi\nsegi empat sama yang lengkap!'" 
                  color="#1e293b" align="center" width="3" font="kelsonsans"></a-text>
          <a-plane position="0 0 -0.05" width="3.2" height="1.5" color="#f8fafc" opacity="0.9"></a-plane>
        </a-entity>

        <a-entity position="0 0.2 0" scale="0.7 0.7 0.7" animation="property: rotation; to: 0 360 0; loop: true; dur: 7000; easing: linear">
          <a-text value="4 x 4 = 16" position="0 0.5 0" color="#eab308" align="center" width="4" rotation="-30 0 0"></a-text>
          <a-box position="-0.45 0 -0.45" width="0.25" height="0.25" depth="0.25" color="#ec4899"></a-box>
          <a-box position="-0.15 0 -0.45" width="0.25" height="0.25" depth="0.25" color="#3b82f6"></a-box>
          <a-box position="0.15 0 -0.45" width="0.25" height="0.25" depth="0.25" color="#ec4899"></a-box>
          <a-box position="0.45 0 -0.45" width="0.25" height="0.25" depth="0.25" color="#3b82f6"></a-box>
          <a-box position="-0.45 0 -0.15" width="0.25" height="0.25" depth="0.25" color="#3b82f6"></a-box>
          <a-box position="-0.15 0 -0.15" width="0.25" height="0.25" depth="0.25" color="#eab308"></a-box>
          <a-box position="0.15 0 -0.15" width="0.25" height="0.25" depth="0.25" color="#eab308"></a-box>
          <a-box position="0.45 0 -0.15" width="0.25" height="0.25" depth="0.25" color="#ec4899"></a-box>
          <a-box position="-0.45 0 0.15" width="0.25" height="0.25" depth="0.25" color="#ec4899"></a-box>
          <a-box position="-0.15 0 0.15" width="0.25" height="0.25" depth="0.25" color="#eab308"></a-box>
          <a-box position="0.15 0 0.15" width="0.25" height="0.25" depth="0.25" color="#eab308"></a-box>
          <a-box position="0.45 0 0.15" width="0.25" height="0.25" depth="0.25" color="#3b82f6"></a-box>
          <a-box position="-0.45 0 0.45" width="0.25" height="0.25" depth="0.25" color="#3b82f6"></a-box>
          <a-box position="-0.15 0 0.45" width="0.25" height="0.25" depth="0.25" color="#ec4899"></a-box>
          <a-box position="0.15 0 0.45" width="0.25" height="0.25" depth="0.25" color="#3b82f6"></a-box>
          <a-box position="0.45 0 0.45" width="0.25" height="0.25" depth="0.25" color="#ec4899"></a-box>
        </a-entity>

      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const marker = document.getElementById('marker-hiro');
      const audioEntity = document.getElementById('audio-player');
      const guide = document.getElementById('audio-guide');

      // Apabila kamera nampak marker, mainkan lagu/suara
      marker.addEventListener('markerFound', function() {
        audioEntity.components.sound.playSound();
      });

      // Apabila marker hilang dari kamera, hentikan bunyi
      marker.addEventListener('markerLost', function() {
        audioEntity.components.sound.stopSound();
      });

      // Keperluan browser: Pengguna wajib sentuh skrin sekali untuk aktifkan fungsi bunyi
      window.addEventListener('click', function() {
        audioEntity.components.sound.playSound();
        guide.style.display = 'none'; // Padam teks panduan selepas ditetap
      });
    </script>
  </body>
</html>
