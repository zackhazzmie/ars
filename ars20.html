<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Matematik AR Soalan 20: Tatatanda Kuasa Tiga</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      #audio-guide {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.7);
        color: white;
        padding: 10px 20px;
        border-radius: 20px;
        font-family: Arial, sans-serif;
        font-size: 14px;
        z-index: 999;
        pointer-events: none;
        text-align: center;
      }
    </style>
  </head>
  
  <body style="margin: 0px; overflow: hidden;">
    
    <div id="audio-guide">Ketuk (Tap) skrin jika suara Cikgu Anggun tidak keluar</div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-assets>
        <audio id="suara-soalan20" src="https://actions.google.com/sounds/v1/ambiences/morning_birds.ogg" preload="auto"></audio>
      </a-assets>

      <a-marker preset="hiro" id="marker-hiro">
        
        <a-entity sound="src: #suara-soalan20; autoplay: false; loop: true; volume: 10" id="audio-player"></a-entity>
        
        <a-entity position="-1.2 0 0" rotation="0 45 0" animation="property: rotation; to: 0 55 0; dir: alternate; dur: 2000; loop: true; easing: easeInOutQuad">
          <a-cone position="0 0.5 0" radius-bottom="0.3" radius-top="0.1" height="0.8" color="#3b82f6"></a-cone>
          <a-sphere position="0 1.05 0" radius="0.26" color="#ec4899"></a-sphere>
          <a-cone position="0 0.85 0" radius-bottom="0.25" radius-top="0.1" height="0.4" color="#ec4899"></a-cone>
          <a-sphere position="0 1.05 0.05" radius="0.2" color="#ffe4e6"></a-sphere>
          <a-sphere position="-0.07 1.1 0.22" radius="0.02" color="#1e293b"></a-sphere>
          <a-sphere position="0.07 1.1 0.22" radius="0.02" color="#1e293b"></a-sphere>
          <a-ellipse position="0 1.0 0.23" radius-x="0.03" radius-y="0.01" color="#be185d"
                     animation="property: scale; to: 1 4 1; dir: alternate; dur: 200; loop: true">
          </a-ellipse>
          <a-cylinder position="0.25 0.5 0.1" radius="0.04" height="0.4" color="#3b82f6" rotation="0 0 -45"
                      animation="property: rotation; to: 0 0 -15; dir: alternate; dur: 800; loop: true">
          </a-cylinder>
        </a-entity>

        <a-entity position="0 1.6 -0.6">
          <a-text value="Cikgu Anggun: \n'Betul ke Kuasa Tiga ditulis 3^2?\n\nSila berhati-hati:\n3^2 bermaksud Kuasa Dua.\n\nKuasa Tiga bagi 3 ditulis:\n3^3 = 3 x 3 x 3 = 27!\n\nKenyataan ini PALSU!'" 
                  color="#1e293b" align="center" width="2.8" font="kelsonsans"></a-text>
          <a-plane position="0 0 -0.05" width="3.2" height="1.7" color="#f8fafc" opacity="0.95"></a-plane>
        </a-entity>

        <a-entity position="0 0.4 0" animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear">
          
          <a-text value="3^2 = 9" position="0 0.4 0" color="#ef4444" width="6" align="center" font="mozillavr"></a-text>
          <a-text value="X" position="0 0.4 0.05" color="#ef4444" width="8" align="center"></a-text>
          
          <a-text value="=" position="0 -0.1 0" color="#1e293b" width="5" align="center"></a-text>
          
          <a-text value="PALSU" position="0 -0.6 0" color="#ef4444" width="8" align="center" font="mozillavr"
                  animation="property: scale; to: 1.3 1.3 1.3; dir: alternate; dur: 600; loop: true">
          </a-text>
          
        </a-entity>

      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const marker = document.getElementById('marker-hiro');
      const audioEntity = document.getElementById('audio-player');
      const guide = document.getElementById('audio-guide');

      marker.addEventListener('markerFound', function() {
        audioEntity.components.sound.playSound();
      });

      marker.addEventListener('markerLost', function() {
        audioEntity.components.sound.stopSound();
      });

      window.addEventListener('click', function() {
        audioEntity.components.sound.playSound();
        guide.style.display = 'none';
      });
    </script>
  </body>
</html>
